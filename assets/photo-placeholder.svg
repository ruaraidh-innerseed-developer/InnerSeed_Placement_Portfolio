  <circle cx="500" cy="120" r="28" fill="#e9eddb"/>

  <circle cx="120" cy="200" r="2.6" fill="#d7e8a8" opacity="0.8"/>
  <circle cx="180" cy="300" r="2.2" fill="#d7e8a8" opacity="0.5"/>
  <circle cx="80" cy="360" r="2.4" fill="#d7e8a8" opacity="0.6"/>

