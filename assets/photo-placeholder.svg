    <path d="M0,34 L110,34 L118,50 L-8,50 Z" fill="#1a2218" stroke="#3a4d3a" stroke-width="1"/>
    <rect x="8" y="-30" width="94" height="64" rx="2" fill="#1a2218" stroke="#3a4d3a" stroke-width="1"/>
